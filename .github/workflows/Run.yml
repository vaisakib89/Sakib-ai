name: SAKIB-BOT

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.18.1'
          cache: 'npm'                # <-- Cache dependencies for faster build

      - name: Install dependencies
        run: npm install             # <-- Remove --force unless necessary

      - name: Audit vulnerabilities
        run: npm audit               # <-- Just check vulnerabilities, don't force fix

      - name: Run SAKIB-BOT
        run: npm start
